version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: detran-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: detran-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
